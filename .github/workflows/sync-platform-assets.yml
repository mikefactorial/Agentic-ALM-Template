name: Sync Platform Assets
run-name: "Sync ${{ inputs.asset_group }} from Agentic-ALM-Template@${{ inputs.platform_ref }}"

on:
  workflow_dispatch:
    inputs:
      asset_group:
        description: "Asset group to sync"
        required: true
        type: choice
        options:
          - alm-skills
          - instructions
          - scripts
          - all
      platform_ref:
        description: "Branch / tag / SHA in Agentic-ALM-Template to sync from (ignored for 'scripts')"
        required: false
        type: string
        default: "main"
      create_pr:
        description: "Open a pull request with the changes (uncheck to push directly to current branch)"
        required: false
        type: boolean
        default: true

jobs:
  sync:
    name: Sync Platform Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          submodules: false   # we manage .platform submodule manually below

      - name: Checkout Agentic-ALM-Template
        if: inputs.asset_group != 'scripts'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Agentic-ALM-Template
          ref: ${{ inputs.platform_ref }}
          path: .platform-template
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync content from PlatformTemplate
        id: sync-content
        if: inputs.asset_group != 'scripts'
        shell: pwsh
        run: |
          $assetGroup = "${{ inputs.asset_group }}"
          $templateRoot = ".platform-template"
          $changed = [System.Collections.Generic.List[string]]::new()

          function Sync-Directory {
            param([string]$Src, [string]$Dst)
            if (-not (Test-Path $Src)) {
              Write-Warning "Source not found: $Src — skipping"
              return
            }
            New-Item -ItemType Directory -Force -Path $Dst | Out-Null
            $srcItems = Get-ChildItem $Src -Recurse -File
            foreach ($item in $srcItems) {
              $rel     = $item.FullName.Substring((Resolve-Path $Src).Path.Length).TrimStart('\','/')
              $dest    = Join-Path $Dst $rel
              New-Item -ItemType Directory -Force -Path (Split-Path $dest -Parent) | Out-Null
              Copy-Item $item.FullName $dest -Force
              $script:changed.Add($dest)
            }
            Write-Host "  Synced $($srcItems.Count) file(s): $Src -> $Dst"
          }

          $groups = switch ($assetGroup) {
            "alm-skills"   { @(".github/skills") }
            "instructions" { @(".github/instructions") }
            "all"          { @(".github/skills", ".github/instructions") }
          }

          foreach ($group in $groups) {
            Write-Host "Syncing $group ..."
            Sync-Directory (Join-Path $templateRoot $group) $group
          }

          Write-Host "Total files synced: $($changed.Count)"
          "changed_count=$($changed.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Update .platform submodule (scripts)
        id: sync-scripts
        if: inputs.asset_group == 'scripts'
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Init submodule if not yet initialized
          git submodule update --init .platform

          # Pull latest from the tracked branch (main)
          git submodule update --remote .platform

          $changed = git status --porcelain .platform | Where-Object { $_ }
          if ($changed) {
            Write-Host "Submodule .platform updated to new commit"
            "changed_count=1" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          } else {
            Write-Host ".platform submodule already up to date"
            "changed_count=0" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

      - name: Commit and open PR
        if: |
          inputs.create_pr == true &&
          ((steps.sync-content.outputs.changed_count != '0' && steps.sync-content.conclusion == 'success') ||
           (steps.sync-scripts.outputs.changed_count != '0' && steps.sync-scripts.conclusion == 'success'))
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ref    = "${{ inputs.platform_ref }}"
          $group  = "${{ inputs.asset_group }}"
          $branch = "chore/sync-platform-assets-$group-$((Get-Date).ToString('yyyyMMdd-HHmm'))"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $branch
          git add -A
          $msg = if ($group -eq 'scripts') {
            "chore: update .platform submodule to latest Agentic-ALM-Workflows@main"
          } else {
            "chore: sync $group from Agentic-ALM-Template@$ref"
          }
          git commit -m $msg
          git push origin $branch

          $body = if ($group -eq 'scripts') {
            "Automated update of ``.platform`` submodule to the latest commit on [Agentic-ALM-Workflows](https://github.com/${{ github.repository_owner }}/Agentic-ALM-Workflows) ``main``.`n`n> Triggered by: @${{ github.actor }}"
          } else {
            "Automated sync of ``$group`` assets from [Agentic-ALM-Template](https://github.com/${{ github.repository_owner }}/Agentic-ALM-Template) at ref ``$ref``.`n`n> Triggered by: @${{ github.actor }}"
          }

          gh pr create `
            --title $msg `
            --body $body `
            --base develop `
            --head $branch

      - name: Commit directly (no PR)
        if: |
          inputs.create_pr == false &&
          ((steps.sync-content.outputs.changed_count != '0' && steps.sync-content.conclusion == 'success') ||
           (steps.sync-scripts.outputs.changed_count != '0' && steps.sync-scripts.conclusion == 'success'))
        shell: pwsh
        run: |
          $ref   = "${{ inputs.platform_ref }}"
          $group = "${{ inputs.asset_group }}"
          $msg = if ($group -eq 'scripts') {
            "chore: update .platform submodule to latest Agentic-ALM-Workflows@main"
          } else {
            "chore: sync $group from Agentic-ALM-Template@$ref"
          }
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m $msg
          git push

      - name: Summary
        shell: pwsh
        run: |
          $group  = "${{ inputs.asset_group }}"
          $ref    = "${{ inputs.platform_ref }}"
          $count  = if ($group -eq 'scripts') {
            "${{ steps.sync-scripts.outputs.changed_count }}"
          } else {
            "${{ steps.sync-content.outputs.changed_count }}"
          }
          Add-Content $env:GITHUB_STEP_SUMMARY "## Platform Asset Sync"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY "| | |"
          Add-Content $env:GITHUB_STEP_SUMMARY "|---|---|"
          Add-Content $env:GITHUB_STEP_SUMMARY "| Asset group | ``$group`` |"
          if ($group -ne 'scripts') {
            Add-Content $env:GITHUB_STEP_SUMMARY "| Template ref | ``$ref`` |"
          }
          Add-Content $env:GITHUB_STEP_SUMMARY "| Changed | $count |"
          Add-Content $env:GITHUB_STEP_SUMMARY ""
          if ($count -eq '0') {
            Add-Content $env:GITHUB_STEP_SUMMARY "> No changes -- already up to date."
          }
